# config.yaml
models:
  
  random_forest: # This will be used in model naming after training.
    type: "RandomForestClassifier"
    params:
      n_estimators: [500, 1000, 1500]                     # More trees help identify rare minority patterns
      class_weight: ["balanced", "balanced_subsample"]    # Penalizes fraud misclassifications based on tree bootstrap samples
      max_depth: [10, 15]                                 # Prevents memorizing noise in majority data
      min_samples_leaf: [10]                              # Ensures leaves are statistically significant, reducing false positives
      max_features: ["sqrt", "log2", None]                # Standard for diverse trees in ensemble
      bootstrap: [true]
      n_jobs: [-1]                                        # Use all available CPU cores for speed
      


  
  logistic_regression:
    type: "LogisticRegression"
    params:
      class_weight: ["balanced"]                # Automatically scales weights to 1:70 ratio
      penalty: ["l1", "l2", "elasticnet"]       # Use L1 to eliminate noise/useless features
      C: [0.1, 0.5, 1.0]                        # Stronger regularization (default is 1.0)
      solver: ["saga"]                          # Handles L1 and scales well to large data
      max_iter: [500, 1000]                     # Ensures the model converges on imbalanced data
      



  xgboost: 
    type: "XGBClassifier"
    params:
      scale_pos_weight: [70.4]        
      max_depth: [3, 6]                     # Shallow trees are more robust for rare events
      min_child_weight: [10]                # Higher values prevent splitting on single fraud cases
      gamma: [1.5]                          # Minimum loss reduction to split; adds conservatism
      lambda: [2.0]                         # L2 regularization to keep leaf weights stable
      alpha: [0.5]                          # L1 regularization for feature sparsity
      subsample: [0.8]                      # Rows sampled per tree to increase robustness
      colsample_bytree: [0.8]               # Features sampled per tree
      learning_rate: [0.01]                 # Low rate + more estimators is better for fraud
      n_estimators: [500, 1000, 1500]       # More trees to capture complex patterns
      tree_method: ["hist" ]                # Faster training for large datasets
      eval_metric: ['aucpr']                # Use AUC-PR for evaluation
      




evaluation:
  # Crucial: Use Area Under Precision-Recall Curve for 1.4% imbalance            
  metrics: ["aucpr", "f1", "precision", "recall"]
  stratify: y
